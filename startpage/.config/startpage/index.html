<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="starticon.png" type="image/png" />
    <title>Start Page (Gruvbox)</title>
    <style>
      :root {
        /* --- Gruvbox Dark Hard --- exact values from morhetz/gruvbox --- */
        --bg0-h: #1d2021; /* hard dark bg */
        --bg: #282828; /* normal bg */
        --bg1: #3c3836;
        --bg2: #504945;
        --bg3: #665c54;
        --bg4: #7c6f64;

        --fg: #ebdbb2; /* normal fg */
        --fg1: #d5c4a1;
        --fg2: #bdae93;
        --fg3: #a89984;

        /* Bright (vivid) accents — these are the punchy ones */
        --red: #fb4934;
        --green: #b8bb26;
        --yellow: #fabd2f;
        --blue: #83a598;
        --purple: #d3869b;
        --aqua: #8ec07c;
        --orange: #fe8019;
        --gray: #928374;

        /* Semantic roles */
        --accent: #fabd2f; /* yellow — headings, labels */
        --alert: #fb4934; /* red — hover borders, warnings */
        --border: #83a598; /* blue — category headers */
        --highlight: #d3869b; /* purple */
        --ok: #b8bb26; /* green — matrix rain primary */

        /* Glass — alpha matches foot.ini alpha=0.85 */
        --glass-bg: rgba(29, 32, 33, 0.85);
        --glass-border: rgba(254, 128, 25, 0.25); /* orange tint border */
        --glass-blur: blur(10px);
        --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.9);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background-color: var(--bg0-h);
        font-family: "CaskaydiaCove NF", "CaskaydiaCove Nerd Font", "JetBrains Mono", "Fira Mono", "Cascadia Code", monospace;
        color: var(--fg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        overflow: hidden;
        position: relative;
      }

      /* ---- MATRIX CANVAS ---- */
      #matrix-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
        opacity: 0.22;
      }

      /* All content sits above canvas */
      body > *:not(#matrix-canvas) {
        position: relative;
        z-index: 1;
      }

      /* ---- GLASS ---- */
      .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        box-shadow: var(--shadow);
        border-radius: 8px;
      }

      /* ---- GREETING ---- */
      h1 {
        font-size: 1.4rem;
        margin-bottom: 10px;
        padding: 18px 36px;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 2px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 450px;
        border: 1px solid rgba(254, 128, 25, 0.3);
        transition: border-color 0.3s ease;
        font-weight: 700;
      }

      h1:hover {
        border-color: var(--alert);
      }

      .quote-text {
        font-size: 0.82rem;
        text-transform: none;
        color: var(--fg2);
        font-style: italic;
        font-weight: 400;
        opacity: 0.85;
        margin-top: 4px;
        letter-spacing: 0;
      }

      /* ---- CLOCK ---- */
      #datetime {
        font-size: 1rem;
        color: var(--fg1);
        padding: 8px 22px;
        margin-bottom: 1.8rem;
        border-color: rgba(250, 189, 47, 0.18);
      }

      /* ---- SEARCH ---- */
      .search-container {
        margin-bottom: 1.8rem;
        z-index: 10;
      }

      form {
        padding: 8px;
        display: flex;
        align-items: center;
        transition: 0.3s ease;
      }

      form:focus-within {
        transform: scale(1.02);
        box-shadow: 0 0 20px rgba(251, 73, 52, 0.25);
        border-color: var(--alert);
      }

      .search-bar input {
        padding: 10px 15px;
        font-size: 1rem;
        width: 350px;
        border: none;
        background: transparent;
        color: var(--fg);
        text-align: center;
        font-family: inherit;
      }

      .search-bar input::placeholder {
        color: var(--fg2);
      }
      .search-bar input:focus {
        outline: none;
      }

      /* ---- QUICKLINKS ---- */
      .quicklines-box {
        padding: 2.2rem;
        max-width: 900px;
        width: 85%;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 2.5rem;
        justify-content: center;
      }

      .category {
        text-align: left;
        min-width: 150px;
      }

      .category h3 {
        color: var(--aqua);
        margin-bottom: 1rem;
        font-size: 1rem;
        border-bottom: 1px solid var(--alert);
        padding-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .category a {
        display: flex;
        align-items: center;
        color: var(--fg1);
        text-decoration: none;
        margin-bottom: 0.55em;
        padding: 5px 8px;
        border-radius: 4px;
        transition: 0.2s;
        font-size: 0.9rem;
      }

      .category a img {
        margin-right: 10px;
        filter: grayscale(0.4) brightness(0.9);
        transition: 0.3s;
      }

      .category a:hover {
        background: rgba(250, 189, 47, 0.12);
        color: var(--accent);
        transform: translateX(5px);
      }

      .category a:hover img {
        filter: grayscale(0) brightness(1.1);
        transform: scale(1.1);
      }

      /* ---- SYS INFO ---- */
      .sys-info {
        position: fixed;
        bottom: 20px;
        display: flex;
        gap: 20px;
        padding: 8px 18px;
        font-family: inherit;
        font-size: 0.78rem;
        color: var(--fg2);
      }

      .sys-label {
        color: var(--accent);
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 600px) {
        h1 {
          min-width: 90%;
          font-size: 1rem;
        }
        .sys-info {
          flex-direction: column;
          bottom: 10px;
        }
        .search-bar input {
          width: 250px;
        }
      }
    </style>
  </head>
  <body id="main-body">
    <!-- Matrix rain -->
    <canvas id="matrix-canvas"></canvas>

    <audio id="sun-audio" src="here-comes-the-sun.mp3" loop></audio>

    <h1 id="greeting" class="glass-panel">
      <span id="greet-line">...</span>
      <span id="quote-line" class="quote-text">...</span>
    </h1>

    <div id="datetime" class="glass-panel"></div>

    <div class="search-container">
      <form
        action="https://searxng.linuxlab.work/search"
        method="get"
        class="glass-panel"
      >
        <div class="search-bar">
          <input
            type="text"
            id="searchInput"
            name="q"
            placeholder="Search... (Press '/')"
            autocomplete="off"
            required
          />
        </div>
      </form>
    </div>

    <div class="quicklines-box glass-panel">
      <div class="links">
        <div class="category">
          <h3>Work</h3>
          <a href="https://github.com"
            ><img src="favicons/github.ico" width="16" height="16" />GitHub</a
          >
          <a href="https://gitlab.com"
            ><img src="favicons/gitlab.ico" width="16" height="16" />GitLab</a
          >
          <a href="https://stackoverflow.com"
            ><img
              src="favicons/stackoverflow.ico"
              width="16"
              height="16"
            />Stack Overflow</a
          >
          <a href="https://mail.google.com/mail/u/0/#inbox"
            ><img src="favicons/gmail.ico" width="16" height="16" />Gmail</a
          >
        </div>
        <div class="category">
          <h3>Media</h3>
          <a href="https://youtube.com"
            ><img src="favicons/youtube.ico" width="16" height="16" />YouTube</a
          >
          <a href="https://twitch.tv"
            ><img src="favicons/twitch.ico" width="16" height="16" />Twitch</a
          >
          <a href="https://www.reddit.com/"
            ><img src="favicons/reddit.ico" width="16" height="16" />Reddit</a
          >
          <a href="https://discord.com/channels/@me"
            ><img src="favicons/discord.ico" width="16" height="16" />Discord</a
          >
        </div>
        <div class="category">
          <h3>Tools</h3>
          <a href="https://gemini.google.com/u/1"
            ><img src="favicons/gemini.svg" width="16" height="16" />Gemini</a
          >
          <a href="https://claude.ai/new"
            ><img src="favicons/claude.svg" width="16" height="16" />Claude</a
          >
          <a href="https://chat.openai.com"
            ><img src="favicons/chatgpt.ico" width="16" height="16" />ChatGPT</a
          >
          <a href="https://terminal.sexy"
            ><img
              src="favicons/hackertype.ico"
              width="16"
              height="16"
            />Terminal Sexy</a
          >
        </div>
        <div class="category">
          <h3>Projects</h3>
          <a href="https://github.com/indyleo/Catalyst"
            ><img src="favicons/github.ico" width="16" height="16" />Catalyst</a
          >
          <a href="https://github.com/indyleo/dotfiles-stow"
            ><img src="favicons/github.ico" width="16" height="16" />Dotfiles</a
          >
          <a href="https://github.com/indyleo/suckless"
            ><img src="favicons/github.ico" width="16" height="16" />Suckless</a
          >
        </div>
      </div>
    </div>

    <div class="sys-info glass-panel" id="sysInfo">
      <div class="sys-item">
        <span class="sys-label">OS:</span> <span id="os-val">...</span>
      </div>
      <div id="distro-container" class="sys-item">
        <span class="sys-label">DISTRO:</span> <span id="distro-val">...</span>
      </div>
      <div class="sys-item">
        <span class="sys-label">BROWSER:</span>
        <span id="browser-val">...</span>
      </div>
    </div>

    <script>
      /* ---- MATRIX RAIN ---- */
      (function () {
        const canvas = document.getElementById("matrix-canvas");
        const ctx = canvas.getContext("2d");

        // Gruvbox vivid brights — green, aqua, yellow, orange
        const colors = ["#b8bb26", "#8ec07c", "#fe8019", "#fabd2f", "#83a598"];
        const fontSize = 14;
        let cols, drops;

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          cols = Math.floor(canvas.width / fontSize);
          drops = Array.from({ length: cols }, () => (Math.random() * -50) | 0);
        }

        function draw() {
          // Fade trail using bg0-h with alpha
          ctx.fillStyle = "rgba(29, 32, 33, 0.055)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.font = fontSize + "px 'JetBrains Mono', monospace";

          for (let i = 0; i < drops.length; i++) {
            // Random katakana / ascii mix
            const char =
              Math.random() > 0.5
                ? String.fromCharCode(0x30a0 + Math.floor(Math.random() * 96))
                : String.fromCharCode(33 + Math.floor(Math.random() * 93));

            ctx.fillStyle = colors[i % colors.length];
            ctx.fillText(char, i * fontSize, drops[i] * fontSize);

            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
              drops[i] = 0;
            }
            drops[i]++;
          }
        }

        resize();
        window.addEventListener("resize", resize);
        setInterval(draw, 45);
      })();

      /* ---- AUDIO ---- */
      function playSunAudio() {
        const audio = document.getElementById("sun-audio");
        audio.volume = 0.4;
        const p = audio.play();
        if (p !== undefined) {
          p.catch(() => {
            const start = () => {
              audio.play();
              document.removeEventListener("click", start);
              document.removeEventListener("keydown", start);
            };
            document.addEventListener("click", start);
            document.addEventListener("keydown", start);
          });
        }
      }

      /* ---- GREETING & CLOCK ---- */
      let currentQuote = "The air is getting warmer around you...";
      let currentRandomPhrase = "Devourer of Gods";

      async function loadTextFiles() {
        try {
          const [quoteRes, phraseRes] = await Promise.all([
            fetch("quotes.txt"),
            fetch("randomphrases.txt"),
          ]);
          if (quoteRes.ok) {
            const quotes = (await quoteRes.text())
              .split("\n")
              .filter((l) => l.trim());
            currentQuote =
              quotes[Math.floor(Math.random() * quotes.length)].trim();
            if (
              currentQuote
                .toLowerCase()
                .includes("here comes the sun do do dodo")
            ) {
              playSunAudio();
            }
          }
          if (phraseRes.ok) {
            const phrases = (await phraseRes.text())
              .split("\n")
              .filter((l) => l.trim());
            currentRandomPhrase =
              phrases[Math.floor(Math.random() * phrases.length)];
          }
          updateClock();
        } catch (e) {
          updateClock();
        }
      }

      function updateClock() {
        const now = new Date();
        const days = [
          "Sunday",
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday",
          "Saturday",
        ];
        const months = [
          "January",
          "February",
          "March",
          "April",
          "May",
          "June",
          "July",
          "August",
          "September",
          "October",
          "November",
          "December",
        ];
        const h = now.getHours();

        document.getElementById("datetime").textContent =
          `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()} • ${h % 12 || 12}:${String(now.getMinutes()).padStart(2, "0")} ${h >= 12 ? "PM" : "AM"}`;

        const greet =
          h < 12 ? "Good Morning" : h < 17 ? "Good Afternoon" : "Good Evening";
        document.getElementById("greet-line").textContent =
          `${greet} — ${currentRandomPhrase}`;
        document.getElementById("quote-line").textContent = `"${currentQuote}"`;
      }

      /* ---- SYS INFO ---- */
      function initSysInfo() {
        const ua = navigator.userAgent;
        let os = "Linux";
        if (ua.indexOf("Win") !== -1) os = "Windows";
        else if (ua.indexOf("Mac") !== -1) os = "MacOS";
        document.getElementById("os-val").textContent = os;
        if (os === "Linux")
          document.getElementById("distro-val").textContent = "Arch";
        else
          document.getElementById("distro-container").classList.add("hidden");
        document.getElementById("browser-val").textContent = ua.includes(
          "Firefox",
        )
          ? "Firefox"
          : ua.includes("Chrome")
            ? "Chrome"
            : "Safari";
      }

      /* ---- INIT ---- */
      loadTextFiles();
      initSysInfo();
      setInterval(updateClock, 1000);

      const searchInput = document.getElementById("searchInput");
      window.onload = () => searchInput.focus();
      document.addEventListener("keydown", (e) => {
        if (e.key === "/" && document.activeElement !== searchInput) {
          e.preventDefault();
          searchInput.focus();
        }
      });
    </script>
  </body>
</html>
