general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot
    color = rgba(1d2021dd)

    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
}

# ============================================================
# TIME (12-hour format)
# ============================================================
label {
    monitor =
    text = $TIME12
    color = rgb(ebdbb2)
    font_size = 90
    font_family = Sans Bold
    position = 0, 120
    halign = center
    valign = center
}

# DATE SUBTITLE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d, %Y")"
    color = rgb(a89984)
    font_size = 20
    font_family = Sans
    position = 0, 40
    halign = center
    valign = center
}

# ============================================================
# INPUT FIELD
# ============================================================
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true

    # Gruvbox: orange outer | dark0_hard inner
    outer_color = rgb(d65d0e)
    inner_color = rgba(1d2021da)
    font_color = rgb(ebdbb2)

    # Check: gruvbox bright_green | Fail: gruvbox bright_red
    check_color = rgb(b8bb26)
    fail_color = rgb(cc241d)

    placeholder_text = <span foreground="##ebdbb2">Identify...</span>
    hide_input = false
    position = 0, -60
    halign = center
    valign = center
}

# ============================================================
# MEDIA WIDGET — Background pill
# ============================================================

# Dark pill background (simulated via image label trick)
label {
    monitor =
    text =
    color = rgba(282828cc)
    font_size = 1
    font_family = Sans
    position = 0, -200
    halign = center
    valign = center
}

# ============================================================
# MEDIA — Track title (marquee via truncation in script)
# ============================================================
label {
    monitor =
    text = cmd[update:2000] mediactl state-title 40
    color = rgb(ebdbb2)
    font_size = 16
    font_family = Sans Bold
    position = 0, -190
    halign = center
    valign = center
}

# ============================================================
# MEDIA — Artist
# ============================================================
label {
    monitor =
    text = cmd[update:2000] mediactl status | awk -F'|' '{print $3}' | cut -c1-40
    color = rgb(a89984)
    font_size = 13
    font_family = Sans
    position = 0, -215
    halign = center
    valign = center
}

# ============================================================
# MEDIA CONTROLS
# Controls are rendered as clickable labels using hyprlock
# button{} blocks (requires hyprlock ≥ 0.5)
# Layout (left to right, centered):
#   [⏮ Prev]  [⏪ -10s]  [⏯ Play/Pause]  [⏩ +10s]  [⏭ Next]
# ============================================================

# Previous Track  ⏮
button {
    monitor =
    position = -120, -250
    halign = center
    valign = center
    size = 36, 36
    on_click = mediactl previous
    color = rgba(504945aa)
    border_color = rgb(7c6f64)
    border_size = 1
    rounding = 18
}

label {
    monitor =
    text = ⏮
    color = rgb(d5c4a1)
    font_size = 16
    font_family = Sans
    position = -120, -250
    halign = center
    valign = center
}

# Seek Back  ⏪  (-10s)
button {
    monitor =
    position = -65, -250
    halign = center
    valign = center
    size = 36, 36
    on_click = mediactl back 10
    color = rgba(504945aa)
    border_color = rgb(7c6f64)
    border_size = 1
    rounding = 18
}

label {
    monitor =
    text = ⏪
    color = rgb(d5c4a1)
    font_size = 16
    font_family = Sans
    position = -65, -250
    halign = center
    valign = center
}

# Play / Pause  ⏯  (larger, accent button)
button {
    monitor =
    position = 0, -250
    halign = center
    valign = center
    size = 48, 48
    on_click = mediactl play-pause
    color = rgba(d65d0ecc)
    border_color = rgb(fe8019)
    border_size = 2
    rounding = 24
}

label {
    monitor =
    text = cmd[update:2000] mediactl state
    color = rgb(fbf1c7)
    font_size = 18
    font_family = Sans Bold
    position = 0, -250
    halign = center
    valign = center
}

# Seek Forward  ⏩  (+10s)
button {
    monitor =
    position = 65, -250
    halign = center
    valign = center
    size = 36, 36
    on_click = mediactl skip 10
    color = rgba(504945aa)
    border_color = rgb(7c6f64)
    border_size = 1
    rounding = 18
}

label {
    monitor =
    text = ⏩
    color = rgb(d5c4a1)
    font_size = 16
    font_family = Sans
    position = 65, -250
    halign = center
    valign = center
}

# Next Track  ⏭
button {
    monitor =
    position = 120, -250
    halign = center
    valign = center
    size = 36, 36
    on_click = mediactl next
    color = rgba(504945aa)
    border_color = rgb(7c6f64)
    border_size = 1
    rounding = 18
}

label {
    monitor =
    text = ⏭
    color = rgb(d5c4a1)
    font_size = 16
    font_family = Sans
    position = 120, -250
    halign = center
    valign = center
}
