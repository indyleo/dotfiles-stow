$mainMod = SUPER

# --- Applications ---
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod SHIFT, D, exec, vesktop
bind = $mainMod SHIFT, G, exec, signal-desktop

# --- Launchers & Rofi ---
bind = $mainMod, R, exec, $menu
bind = $mainMod SHIFT, C, exec, wayclip.py select
bind = $mainMod SHIFT, E, exec, rofi_emoji.py
bind = $mainMod ALT, E, exec, rofi_nerdfont.py
bind = $mainMod SHIFT, P, exec, rofi_power
bind = $mainMod, N, exec, rofi_notebook

# --- Window Management ---
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exit
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod SHIFT, Space, togglefloating
bind = $mainMod SHIFT, F, fullscreen, 0

# Focus & Layout
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod SHIFT, equal, layoutmsg, addmaster
bind = $mainMod SHIFT, minus, layoutmsg, removemaster

# --- System & Hardware ---
bindel = , XF86MonBrightnessUp, exec, sysctl bri -i 5
bindel = , XF86MonBrightnessDown, exec, sysctl bri -d 5
bind = $mainMod SHIFT, L, exec, hyprlock

# Volume
bindel = $mainMod ALT, Up, exec, sysctl vol -i 5
bindel = $mainMod ALT, Down, exec, sysctl vol -d 5
bindel = $mainMod ALT, M, exec, sysctl vol --toggle
bindel = ALT, XF86AudioRaiseVolume, exec, sysctl vol -i 5
bindel = ALT, XF86AudioLowerVolume, exec, sysctl vol -d 5
bindel = ALT, XF86AudioMute, exec, sysctl vol --toggle

# Microphone
bindel = $mainMod SHIFT, Up, exec, sysctl mic -i 5
bindel = $mainMod SHIFT, Down, exec, sysctl mic -d 5
bindel = $mainMod SHIFT, M, exec, sysctl mic --toggle
bindel = SHIFT, XF86AudioRaiseVolume, exec, sysctl mic -i 5
bindel = SHIFT, XF86AudioLowerVolume, exec, sysctl mic -d 5
bindel = SHIFT, XF86AudioMicMute, exec, sysctl mic --toggle

# --- Media Controls (Song) ---
bindl = $mainMod, Right, exec, mediactl --source song next
bindl = $mainMod, Left, exec, mediactl --source song previous
bindl = $mainMod, S, exec, mediactl --source song play-pause
binde = $mainMod SHIFT, Right, exec, mediactl --source song skip 10
binde = $mainMod SHIFT, Left, exec, mediactl --source song back 10
bindl = , XF86AudioNext, exec, mediactl --source song next
bindl = , XF86AudioPrev, exec, mediactl --source song previous
bindl = , XF86AudioPlay, exec, mediactl --source song play-pause

# --- Media Controls (Browser) ---
bindl = $mainMod ALT, Right, exec, mediactl --source browser next
bindl = $mainMod ALT, Left, exec, mediactl --source browser previous
bindl = $mainMod ALT, S, exec, mediactl --source browser play-pause
binde = $mainMod ALT SHIFT, Right, exec, mediactl --source browser skip 10
binde = $mainMod ALT SHIFT, Left, exec, mediactl --source browser back 10
bindl = ALT, XF86AudioNext, exec, mediactl --source browser next
bindl = ALT, XF86AudioPrev, exec, mediactl --source browser previous
bindl = ALT, XF86AudioPlay, exec, mediactl --source browser play-pause

# --- Screenshots & Recording ---
bind = , Print, exec, sstool --select
bind = $mainMod, Print, exec, sstool --screen
bind = $mainMod SHIFT, Print, exec, sstool --fullscreen
bind = $mainMod CTRL, Print, exec, sstool --window
bind = $mainMod ALT, Print, exec, sstool --colorpicker
bind = $mainMod ALT, R, exec, rofi_screen

# --- Wallpapers ---
# bind = $mainMod SHIFT, W, exec, desktopctl random ~/Pictures/Wallpapers/gruvbox

# --- Wiki's ---
bind = $mainMod, W, exec, wikibook

# --- Workspaces ---
bind = $mainMod, 1, split:workspace, 1
bind = $mainMod, 2, split:workspace, 2
bind = $mainMod, 3, split:workspace, 3
bind = $mainMod, 4, split:workspace, 4
bind = $mainMod, 5, split:workspace, 5
bind = $mainMod, 7, split:workspace, 7
bind = $mainMod, 8, split:workspace, 8
bind = $mainMod, 9, split:workspace, 9
bind = $mainMod, 10, split:workspace, 10

bind = $mainMod SHIFT, 1, split:movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, split:movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, split:movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, split:movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, split:movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, split:movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, split:movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, split:movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, split:movetoworkspacesilent, 9
bind = $mainMod SHIFT, 10, split:movetoworkspacesilent, 10

bind = $mainMod CONTROL, 1, split:movetoworkspace, 1
bind = $mainMod CONTROL, 2, split:movetoworkspace, 2
bind = $mainMod CONTROL, 3, split:movetoworkspace, 3
bind = $mainMod CONTROL, 4, split:movetoworkspace, 4
bind = $mainMod CONTROL, 5, split:movetoworkspace, 5
bind = $mainMod CONTROL, 6, split:movetoworkspace, 6
bind = $mainMod CONTROL, 7, split:movetoworkspace, 7
bind = $mainMod CONTROL, 8, split:movetoworkspace, 8
bind = $mainMod CONTROL, 9, split:movetoworkspace, 9
bind = $mainMod CONTROL, 10, split:movetoworkspace, 10

bind = $mainMod CONTROL, D, split:swapactiveworkspaces, current +1
bind = $mainMod CONTROL, G, split:grabroguewindows

# --- Scratchpads ---
bind = $mainMod, T, exec, $scratchpad termsc
bind = $mainMod, Y, exec, $scratchpad lfsc lf
bind = $mainMod, Z, exec, $scratchpad qalsc qalc
bind = $mainMod, A, exec, $scratchpad wiremixsc wiremix
bind = $mainMod, G, exec, $scratchpad gurks gurks
bind = $mainMod, D, exec, $scratchpad discordo discordo
bind = $mainMod, C, exec, $scratchpad twitch-tui twt
bind = $mainMod, M, exec, $scratchpad musicsc subsonic-tui

# --- Mouse Binds ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
